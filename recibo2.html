<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
width:58mm;
font-family:monospace;
font-size:12px;
padding:5px;
}

.titulo{
text-align:center;
font-size:16px;
font-weight:bold;
}

.linea{
border-top:1px dashed black;
margin:6px 0;
}

.row{
display:flex;
justify-content:space-between;
}

.center{
text-align:center;
}

</style>

</head>

<body>

<div class="titulo" id="empresa"></div>
<div class="center">RECIBO DE PAGO</div>

<div class="linea"></div>

<div>
Recibo: <span id="id_ingreso"></span><br>
Fecha: <span id="fecha"></span><br>
Cliente: <span id="cliente"></span>
</div>

<div class="linea"></div>

<div class="row">
<span>Credito</span>
<span id="credito"></span>
</div>

<div class="row">
<span>Cuota</span>
<span id="cuota"></span>
</div>

<div class="row">
<span>Valor cuota</span>
<span id="valor"></span>
</div>

<div class="row">
<span>Atrasos</span>
<span id="atrasos"></span>
</div>

<div class="row">
<span>Mora</span>
<span id="mora"></span>
</div>

<div class="row">
<span>Pago</span>
<span id="ingreso"></span>
</div>

<div class="linea"></div>

<div class="row">
<span>Saldo</span>
<span id="saldo"></span>
</div>

<div class="linea"></div>

<div class="center">
Gracias por su pago
</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id_ingreso");

const appId = "58a661a7-8e9d-4b93-bd3f-052368fe5767";
const accessKey = "TU_API_KEY";

const url =
"https://api.appsheet.com/api/v2/apps/"+appId+"/tables/ingresos/Action";

const body = {
"Action":"Find",
"Properties":{},
"Rows":[
{
"id_ingreso":id
}
]
};

fetch(url,{
method:"POST",
headers:{
"ApplicationAccessKey":accessKey,
"Content-Type":"application/json"
},
body:JSON.stringify(body)
})
.then(r=>r.json())
.then(data=>{

let r = data.Rows[0];

document.getElementById("empresa").innerText = r.EmpresaCr;
document.getElementById("id_ingreso").innerText = r.id_ingreso;
document.getElementById("fecha").innerText = r.fecha;
document.getElementById("cliente").innerText = r.nombrecl;
document.getElementById("credito").innerText = r.id_credito;
document.getElementById("cuota").innerText = r.cuota_numero;
document.getElementById("valor").innerText = r.valor_cuota;
document.getElementById("atrasos").innerText = r.atrasosc;
document.getElementById("mora").innerText = r.sancion_mora;
document.getElementById("ingreso").innerText = r.ingreso;
document.getElementById("saldo").innerText = r.saldo;

});

</script>

</body>
</html>
