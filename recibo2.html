<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
width:58mm;
font-family:monospace;
font-size:12px;
padding:4px;
margin:0;
}

.titulo{
text-align:center;
font-size:15px;
font-weight:bold;
}

.center{
text-align:center;
}

.linea{
border-top:1px dashed black;
margin:5px 0;
}

.row{
display:flex;
justify-content:space-between;
}

.total{
font-weight:bold;
font-size:14px;
}

</style>

</head>

<body>

<div class="titulo" id="empresa"></div>
<div class="center">RECIBO DE PAGO</div>

<div class="linea"></div>

<div>
Recibo: <span id="id_ingreso"></span><br>
Fecha: <span id="fecha"></span><br>
Cliente: <span id="cliente"></span>
</div>

<div class="linea"></div>

<div class="row">
<span>Credito</span>
<span id="credito"></span>
</div>

<div class="row">
<span>Cuota</span>
<span id="cuota"></span>
</div>

<div class="row">
<span>Valor cuota</span>
<span id="valor"></span>
</div>

<div class="row">
<span>Atrasos</span>
<span id="atrasos"></span>
</div>

<div class="row">
<span>Mora</span>
<span id="mora"></span>
</div>

<div class="linea"></div>

<div class="row total">
<span>PAGO</span>
<span id="ingreso"></span>
</div>

<div class="linea"></div>

<div class="row">
<span>Saldo</span>
<span id="saldo"></span>
</div>

<div class="linea"></div>

<div class="center">
Gracias por su pago
</div>

<script>

function dinero(v){
return new Intl.NumberFormat('es-CO').format(v || 0);
}

const params = new URLSearchParams(window.location.search);

document.getElementById("empresa").innerText = params.get("empresa");
document.getElementById("id_ingreso").innerText = params.get("id");
document.getElementById("fecha").innerText = params.get("fecha");
document.getElementById("cliente").innerText = params.get("cliente");

document.getElementById("credito").innerText = params.get("credito");
document.getElementById("cuota").innerText = params.get("cuota");

document.getElementById("valor").innerText = "$"+dinero(params.get("valor"));
document.getElementById("atrasos").innerText = params.get("atrasos");
document.getElementById("mora").innerText = "$"+dinero(params.get("mora"));
document.getElementById("ingreso").innerText = "$"+dinero(params.get("pago"));
document.getElementById("saldo").innerText = "$"+dinero(params.get("saldo"));

setTimeout(()=>{
window.print();
},500);

</script>

</body>
</html>
