<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
width:58mm;
font-family:monospace;
font-size:12px;
padding:4px;
margin:0;
}

.titulo{
text-align:center;
font-size:15px;
font-weight:bold;
}

.center{
text-align:center;
}

.linea{
border-top:1px dashed black;
margin:5px 0;
}

.row{
display:flex;
justify-content:space-between;
}

.total{
font-weight:bold;
font-size:14px;
}

</style>

</head>

<body>

<div class="titulo" id="empresa">EMPRESA</div>
<div class="center">RECIBO DE PAGO</div>

<div class="linea"></div>

<div>
Recibo: <span id="id_ingreso"></span><br>
Fecha: <span id="fecha"></span><br>
Cliente: <span id="cliente"></span>
</div>

<div class="linea"></div>

<div class="row">
<span>Credito</span>
<span id="credito"></span>
</div>

<div class="row">
<span>Cuota</span>
<span id="cuota"></span>
</div>

<div class="row">
<span>Valor cuota</span>
<span id="valor"></span>
</div>

<div class="row">
<span>Atrasos</span>
<span id="atrasos"></span>
</div>

<div class="row">
<span>Mora</span>
<span id="mora"></span>
</div>

<div class="linea"></div>

<div class="row total">
<span>PAGO</span>
<span id="ingreso"></span>
</div>

<div class="linea"></div>

<div class="row">
<span>Saldo</span>
<span id="saldo"></span>
</div>

<div class="linea"></div>

<div class="center">
Gracias por su pago
</div>

<br>

<div class="center">
www.magaby.com
</div>

<script>

function dinero(v){
return new Intl.NumberFormat('es-CO').format(v || 0);
}

const params = new URLSearchParams(window.location.search);
const id = params.get("id_ingreso");

const appId = "58a661a7-8e9d-4b93-bd3f-052368fe5767";
const accessKey = "V2-mo67y-hHGRh-UQpNZ-lh1L6-Ptx1j-lyHKe-M5n2b-hcQHK";

const url = "https://api.appsheet.com/api/v2/apps/"+appId+"/tables/ingresos/Action";

const body = {
"Action":"Get",
"Properties":{},
"Rows":[]
};

fetch(url,{
method:"POST",
headers:{
"ApplicationAccessKey":accessKey,
"Content-Type":"application/json"
},
body:JSON.stringify(body)
})
.then(r=>r.json())
.then(data=>{

let r = data.Rows.find(x => x.id_ingreso == id);

if(!r){
alert("No se encontró el recibo");
return;
}

document.getElementById("empresa").innerText = r.EmpresaIg || "";
document.getElementById("id_ingreso").innerText = r.id_ingreso || "";
document.getElementById("fecha").innerText = r.fecha || "";
document.getElementById("cliente").innerText = r.nombre || "";
document.getElementById("credito").innerText = r.credito || "";
document.getElementById("cuota").innerText = r.CuotaNumero || "";

document.getElementById("valor").innerText = "$"+dinero(r.cuota);
document.getElementById("atrasos").innerText = r.atraso || 0;
document.getElementById("mora").innerText = "$"+dinero(r.sancion);
document.getElementById("ingreso").innerText = "$"+dinero(r.ingreso);
document.getElementById("saldo").innerText = "$"+dinero(r.saldoi);

setTimeout(()=>{
window.print();
},600);

});

</script>
</body>
</html>
