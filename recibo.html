<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recibo</title>

<style>

body{
font-family: monospace;
font-size:11px;
font-weight:bold;
display:flex;
justify-content:center;
background:#eee;
}

.ticket{
width:58mm;
background:white;
padding:6px;
}

.center{text-align:center}

.line{
display:flex;
justify-content:space-between;
margin:2px 0;
}

.total{
border-top:1px dashed #000;
margin-top:4px;
padding-top:4px;
font-size:13px;
}

hr{
border:none;
border-top:1px dashed #000;
margin:6px 0;
}

</style>
</head>

<body>

<div class="ticket">

<div class="center">
<b>LA MAQUINA</b><br>
COMPROBANTE DE PAGO
</div>

<hr>

<div class="line">
<span>ID:</span>
<span id="id"></span>
</div>

<div class="line">
<span>CRÉDITO:</span>
<span id="credito"></span>
</div>

<div class="line">
<span>FECHA:</span>
<span id="fecha"></span>
</div>

<div>
CLIENTE:<br>
<span id="cliente"></span>
</div>

<hr>

<div class="center">DETALLE DEL PAGO</div>

<div class="line">
<span>SALDO:</span>
<span id="saldo"></span>
</div>

<div class="line">
<span>CUOTA:</span>
<span id="cuota"></span>
</div>

<div class="line">
<span>CUOTA No:</span>
<span id="cuotan"></span>
</div>

<div class="line">
<span>ATRASO:</span>
<span id="atraso"></span>
</div>

<div class="line">
<span>MORA:</span>
<span id="mora"></span>
</div>

<div class="line total">
<span>PAGO:</span>
<span id="pago"></span>
</div>

<hr>

<div class="line">
<span>NUEVO SALDO:</span>
<span id="nsaldo"></span>
</div>

<hr>

<div class="center">
Comprobante no fiscal<br>
Gracias por su pago
</div>

</div>

<script>

function money(v){
return new Intl.NumberFormat('es-CO',{
style:'currency',
currency:'COP',
minimumFractionDigits:0
}).format(v)
}

function g(p){
return new URLSearchParams(window.location.search).get(p) || 0
}

document.getElementById("id").innerText=g("id_ingreso")
document.getElementById("credito").innerText=g("id_credito")
document.getElementById("fecha").innerText=g("fecha")
document.getElementById("cliente").innerText=g("nombrecl")

document.getElementById("saldo").innerText=money(g("saldo_ant"))
document.getElementById("cuota").innerText=money(g("cuota_esperada"))
document.getElementById("cuotan").innerText=g("cuotanumero")
document.getElementById("atraso").innerText=g("dias_atraso")
document.getElementById("mora").innerText=money(g("sancion"))

document.getElementById("pago").innerText=money(g("monto_ingreso"))
document.getElementById("nsaldo").innerText=money(g("nuevo_saldo"))

setTimeout(()=>{window.print()},200)

</script>

</body>
</html>
